labels:
  platform: linux/arm64

steps: 
   - name: terraform plan 
     image: ghcr.io/pintz-org/asdf-terraform:1.8.2_debug
     settings:
       command: "plan"
       path: "test/terraform"

   - name: terraform auto-approve 
     image: ghcr.io/pintz-org/asdf-terraform:1.8.2_debug 
     settings:
       command: "apply -auto-approve"
       path: "test/terraform"

